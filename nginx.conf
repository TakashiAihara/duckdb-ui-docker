worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Long timeout for DuckDB queries
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    server {
        listen 8080;
        server_name localhost;

        location / {
            proxy_pass http://[::1]:4213;
            proxy_http_version 1.1;

            # Required for DuckDB UI origin checks
            proxy_set_header Host "[::1]:4213";
            proxy_set_header Origin "http://localhost:4213";
            proxy_set_header Referer "http://localhost:4213/";

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Strip forwarded headers so DuckDB doesn't reject the request
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_set_header X-Forwarded-Port "";
        }
    }

    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate     /etc/ssl/certs/nginx-duckdb.pem;
        ssl_certificate_key /etc/ssl/private/nginx-duckdb.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://[::1]:4213;
            proxy_http_version 1.1;

            proxy_set_header Host "[::1]:4213";
            proxy_set_header Origin "http://localhost:4213";
            proxy_set_header Referer "http://localhost:4213/";

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_set_header X-Forwarded-Port "";
        }
    }
}
